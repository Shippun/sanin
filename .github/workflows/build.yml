name: Build Midnight

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build google release
        run: ./gradlew assembleGoogleRelease --build-cache --parallel

      - name: Collect APKs
        run: |
          mkdir -p /tmp/apks/release
          find app/build/outputs/apk -name "*.apk" -exec cp {} /tmp/apks/release/ \;
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apk-google-release
          path: /tmp/apks/release/*.apk

      - name: Generate tag and release notes
        id: release
        run: |
          LATEST_TAG=$(git tag --list '0.*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            NEW_TAG="0.2.5"
          else
            PATCH=$(echo "$LATEST_TAG" | sed 's/^0\.2\.\([0-9]*\)$/\1/')
            if [ "$PATCH" = "$LATEST_TAG" ]; then
              NEW_TAG="0.2.5"
            else
              NEW_TAG="0.2.$((PATCH + 1))"
            fi
          fi
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

          if [ -z "$LATEST_TAG" ]; then
            RANGE="HEAD~10..HEAD"
          else
            RANGE="${LATEST_TAG}..HEAD"
          fi

          NOTES="# v$NEW_TAG"
          while IFS= read -r line; do
            SHA=$(echo "$line" | awk '{print $1}')
            MSG=$(echo "$line" | cut -d' ' -f2-)
            NOTES="$NOTES"$'\n\n'"### ${SHA} — ${MSG}"
            BODY=$(git log --format="%b" -1 "$SHA" | tr '\n' ' ' | sed 's/  */ /g' | xargs)
            if [ -n "$BODY" ]; then
              NOTES="$NOTES"$'\n'"$BODY"
            else
              NOTES="$NOTES"$'\n'"${MSG}"
            fi
          done <<< "$(git log "$RANGE" --oneline --reverse)"

          echo "$NOTES" > /tmp/release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.new_tag }}
          name: "v${{ steps.release.outputs.new_tag }}"
          body_path: /tmp/release_notes.md
          files: /tmp/apks/release/*.apk
          generate_release_notes: false
          make_latest: true
