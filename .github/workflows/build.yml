name: Build Midnight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flavor: [fdroid, google]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build ${{ matrix.flavor }} debug
        run: ./gradlew assemble${{ matrix.flavor }}Debug

      - name: Collect APKs
        run: |
          mkdir -p /tmp/apks/${{ matrix.flavor }}-debug
          find app/build/outputs/apk -name "*.apk" -exec cp {} /tmp/apks/${{ matrix.flavor }}-debug/ \;
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.flavor }}-debug
          path: /tmp/apks/${{ matrix.flavor }}-debug/*.apk
