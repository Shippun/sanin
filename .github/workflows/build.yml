name: Build Midnight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flavor: [fdroid, google]
        build-type: [debug, release]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build ${{ matrix.flavor }}${{ matrix.build-type }}
        run: |
          if [ "${{ matrix.build-type }}" = "debug" ]; then
            ./gradlew assemble${{ matrix.flavor }}Debug
          else
            ./gradlew assemble${{ matrix.flavor }}Release
          fi

      - name: Collect APKs
        run: |
          mkdir -p /tmp/apks/${{ matrix.flavor }}-${{ matrix.build-type }}
          find app/build/outputs/apk -name "*.apk" -exec cp {} /tmp/apks/${{ matrix.flavor }}-${{ matrix.build-type }}/ \;
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.flavor }}-${{ matrix.build-type }}
          path: /tmp/apks/${{ matrix.flavor }}-${{ matrix.build-type }}/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/all-apks

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Midnight Build #${{ github.run_number }}
          body: |
            Automated build #${{ github.run_number }}
            
            Variants:
            - fdroid-debug (armeabi-v7a, arm64-v8a, universal)
            - fdroid-release (armeabi-v7a, arm64-v8a, universal)
            - google-debug (armeabi-v7a, arm64-v8a, universal)
            - google-release (armeabi-v7a, arm64-v8a, universal)
          files: |
            /tmp/all-apks/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
